[project]
name = "fibrelasertoolkit-core"
version = "0.1.0"
description = "Library for fibre optics and lasers simulations"
readme = "README.md"
authors = [{ name = "Martin Damyanov", email = "martindamyanov@outlook.com" }]
requires-python = ">=3.14"
dependencies = [
    "matplotlib>=3.10.8",
    "numpy>=2.4.4",
    "scipy>=1.17.1",
]

license = { text = "MIT" }

[build-system]
requires = ["uv_build>=0.11.2,<0.12.0"]
build-backend = "uv_build"
